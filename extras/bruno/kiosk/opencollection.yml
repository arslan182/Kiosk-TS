opencollection: 1.0.0

info:
  name: kiosk
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: "{{oidcTokenUrl}}"
    credentials:
      clientId: javascript-client
      clientSecret: z0pxtV2YXwRjxmDm2PosKGtzsMMwn7FE
      placement: body
    resourceOwner:
      username: admin
      password: p
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
    settings:
      autoFetchToken: true
      autoRefreshToken: false
  variables:
    - name: baseUrl
      value: https://localhost:3000
    - name: keycloakUrl
      value: https://localhost:8843
    - name: realm
      value: javascript
    - name: realmUrl
      value: "{{keycloakUrl}}/realms/{{realm}}"
    - name: oidcUrl
      value: "{{realmUrl}}/protocol/openid-connect"
    - name: oidcAuthUrl
      value: "{{oidcUrl}}/auth"
    - name: oidcTokenUrl
      value: "{{oidcUrl}}/token"
    - name: authUrl
      value: "{{baseUrl}}/auth"
    - name: tokenUrl
      value: "{{authUrl}}/token"
    - name: keycloakUrl
      value: http://localhost:8880
      disabled: true
bundled: false
extensions: {}
