info:
  name: Kiosk 30 ohne Versionsnummer ändern
  type: http
  seq: 3

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: ""
      value: ""
      disabled: true
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Super Kiosk Am Eck",
        "email": "kontakt@superkiosk.de",
        "istGeoeffnet": true,
        "homepage": "https://superkiosk.de",
        "username": "admin_kiosk"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "428"
    - expression: res.headers['content-type']
      operator: eq
      value: application/problem+json
    - expression: res.body.statusCode
      operator: eq
      value: "428"
    - expression: res.body.detail
      operator: contains
      value: If-Match

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5