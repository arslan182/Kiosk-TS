name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v6

      - name: Bun installieren
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: CI-Konfiguration erstellen
        run: |
          mkdir -p src/config/resources
          cat > src/config/resources/app.toml <<'EOF'
          [server]
          port = 3000
          portHttp = 3030

          [db]
          populate = true

          [mail]
          host = "localhost"
          port = 1025
          log = false

          [keycloak]
          host = "localhost"
          port = 8843

          [log]
          dir = "./log"
          level = "debug"
          pretty = true
          EOF

      - name: Abhaengigkeiten installieren
        run: bun install --frozen-lockfile

      - name: Formatierung pruefen
        run: bun run prettier:check

      - name: ESLint ausfuehren
        run: bun run eslint

      - name: TypeScript pruefen
        run: bun run tsc

      - name: Unit-Tests ausfuehren
        run: bun vitest --project unit
